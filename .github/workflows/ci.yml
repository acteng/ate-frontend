name: CI

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm clean-install

      - name: Build package
        run: npm run build
